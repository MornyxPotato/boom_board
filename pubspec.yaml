name: boom_board
description: "A simple game."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  get: ^4.7.3
  get_it: ^9.2.1
  socket_io_client: ^3.1.4
  logger: ^2.7.0
  flutter_dotenv: ^6.0.1
  event_bus: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.12.0
  flutter_gen_runner: ^5.14.1

  flutter_lints: ^6.0.0

flutter_gen:
  assets:
    exclude:
      - .env

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/

  fonts:
    - family: PressStart2P
      fonts:
        - asset: assets/fonts/PressStart2P-Regular.ttf
